version: "3.9"

services:
  nuxt-app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: nuxt-app

    restart: always

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
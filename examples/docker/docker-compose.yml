version: "3.9"

services:
  nuxt:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: nuxt-app

    restart: unless-stopped

    ports:
      - "3000:3000"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3